<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Semester UI Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const CleanSemesterUI = () => {
            const getCurrentSemester = () => {
                const now = new Date();
                const month = now.getMonth() + 1;
                
                if (month >= 9 || month <= 1) {
                    return { name: 'First Semester', period: 'September - January', active: true };
                }
                else if (month >= 2 && month <= 6) {
                    return { name: 'Second Semester', period: 'February - June', active: true };
                }
                else if (month >= 7 && month <= 8) {
                    return { name: 'Mid-Year/Summer', period: 'July - August', active: true };
                }
                
                return { name: 'Break Period', period: 'Between Semesters', active: false };
            };

            const currentSemester = getCurrentSemester();
            const [selectedPeriod, setSelectedPeriod] = React.useState(currentSemester);

            const testPeriods = [
                { name: 'First Semester', period: 'September - January', active: true },
                { name: 'Second Semester', period: 'February - June', active: true },
                { name: 'Mid-Year/Summer', period: 'July - August', active: true },
                { name: 'Break Period', period: 'Between Semesters', active: false }
            ];

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-50 via-green-100 to-gray-50 p-8">
                    <div className="max-w-4xl mx-auto">
                        <h1 className="text-3xl font-bold text-gray-900 mb-8">Clean & Minimal Semester UI</h1>
                        
                        {/* Test Period Selector */}
                        <div className="mb-8 p-4 bg-white rounded-lg shadow border">
                            <h3 className="text-lg font-semibold mb-3">Test Different Periods:</h3>
                            <div className="flex flex-wrap gap-2">
                                {testPeriods.map((period, index) => (
                                    <button
                                        key={index}
                                        onClick={() => setSelectedPeriod(period)}
                                        className={`px-3 py-1 rounded text-sm font-medium transition-colors ${
                                            selectedPeriod.name === period.name
                                                ? 'bg-green-600 text-white'
                                                : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                        }`}
                                    >
                                        {period.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Clean Schedule Header */}
                        <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
                            <div className="bg-gradient-to-r from-green-700 via-green-600 to-green-800 px-8 py-6">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <h3 className="text-2xl font-bold text-white flex items-center gap-2">
                                            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                            Class Schedule
                                            <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-white/10 text-white/90">
                                                <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                                </svg>
                                                {selectedPeriod.name}
                                            </span>
                                        </h3>
                                        <p className="text-green-200 text-sm mt-1">
                                            0 classes scheduled this week • {selectedPeriod.period}
                                        </p>
                                    </div>
                                    <button className="px-4 py-2 bg-white/20 hover:bg-white/30 text-white font-semibold rounded-lg transition-all duration-200 shadow-md flex items-center gap-2">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                        </svg>
                                        Edit Schedule
                                    </button>
                                </div>
                            </div>

                            <div className="p-6">
                                {/* Simple break period notice - only show when needed */}
                                {!selectedPeriod.active && (
                                    <div className="mb-6 p-3 bg-orange-50 border border-orange-200 rounded-lg">
                                        <div className="flex items-center gap-2 text-orange-800">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                            <span className="text-sm font-medium">
                                                Schedules are hidden during break periods and will reappear when the next semester begins.
                                            </span>
                                        </div>
                                    </div>
                                )}

                                {/* Schedule content area */}
                                <div className="text-center py-12 text-gray-500">
                                    <svg className="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    <p className="text-lg font-medium">No schedule set yet</p>
                                    <p className="text-sm mt-1">Click "Edit Schedule" then "Add Class" to add your classes</p>
                                </div>
                            </div>
                        </div>

                        {/* Comparison */}
                        <div className="mt-8 p-4 bg-white rounded-lg shadow border">
                            <h3 className="text-lg font-semibold mb-3">Key Improvements:</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <h4 className="font-medium text-green-700 mb-2">✅ Clean & Minimal</h4>
                                    <ul className="space-y-1 text-gray-600">
                                        <li>• Simple semester badge in header</li>
                                        <li>• Minimal break period notice</li>
                                        <li>• Clean visual hierarchy</li>
                                        <li>• Reduced visual clutter</li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="font-medium text-red-700 mb-2">❌ Removed Excessive Elements</h4>
                                    <ul className="space-y-1 text-gray-600">
                                        <li>• Large semester information panel</li>
                                        <li>• Redundant status indicators</li>
                                        <li>• Verbose explanatory text</li>
                                        <li>• Complex semester guide section</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CleanSemesterUI />, document.getElementById('root'));
    </script>
</body>
</html>
