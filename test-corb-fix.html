<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORB Fix Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { padding: 10px 15px; margin: 5px; }
        textarea { width: 100%; height: 200px; }
    </style>
</head>
<body>
    <h1>CORB Issue Test Suite</h1>
    
    <div class="test-section">
        <h2>Test 1: Check CORS Preflight</h2>
        <button onclick="testCORSPreflight()">Test CORS Preflight</button>
        <div id="cors-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Test File Upload Endpoint</h2>
        <input type="file" id="test-file" accept="image/*">
        <button onclick="testFileUpload()">Test File Upload</button>
        <div id="upload-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Check Response Headers</h2>
        <button onclick="checkResponseHeaders()">Check Headers</button>
        <div id="headers-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Console Output</h2>
        <textarea id="console-output" readonly></textarea>
        <button onclick="clearConsole()">Clear</button>
    </div>

    <script>
        const API_BASE = window.location.origin.includes('localhost:5173') 
            ? 'http://localhost:8000/api' 
            : 'https://eventmanagement-backend-z7ek.onrender.com/api';
        
        function log(message, type = 'info') {
            const output = document.getElementById('console-output');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            output.value += `[${timestamp}] ${message}\n`;
            output.scrollTop = output.scrollHeight;
            console.log(message);
        }
        
        function clearConsole() {
            document.getElementById('console-output').value = '';
        }
        
        async function testCORSPreflight() {
            const resultDiv = document.getElementById('cors-result');
            resultDiv.innerHTML = '<p class="info">Testing CORS preflight...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/events`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'POST',
                        'Access-Control-Request-Headers': 'authorization,content-type'
                    }
                });
                
                log(`CORS Preflight Status: ${response.status}`, response.ok ? 'success' : 'error');
                
                const headers = {};
                for (let [key, value] of response.headers.entries()) {
                    headers[key] = value;
                }
                
                log(`CORS Headers: ${JSON.stringify(headers, null, 2)}`);
                
                resultDiv.innerHTML = `
                    <p class="${response.ok ? 'success' : 'error'}">
                        Status: ${response.status} ${response.statusText}
                    </p>
                    <pre>${JSON.stringify(headers, null, 2)}</pre>
                `;
            } catch (error) {
                log(`CORS Preflight Error: ${error.message}`, 'error');
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
        
        async function testFileUpload() {
            const resultDiv = document.getElementById('upload-result');
            const fileInput = document.getElementById('test-file');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '<p class="error">Please select a file first</p>';
                return;
            }
            
            resultDiv.innerHTML = '<p class="info">Testing file upload...</p>';
            
            const formData = new FormData();
            formData.append('images[]', fileInput.files[0]);
            formData.append('title', 'Test Event');
            formData.append('description', 'Test Description');
            formData.append('location', 'Test Location');
            formData.append('event_type', 'event');
            formData.append('date', new Date().toISOString().split('T')[0]);
            formData.append('time', '10:00');
            formData.append('school_year', '2025-2026');
            formData.append('is_urgent', '0');
            
            try {
                // First test the debug endpoint
                const debugResponse = await fetch(`${API_BASE}/test-upload`, {
                    method: 'POST',
                    body: formData
                });
                
                log(`Debug Upload Status: ${debugResponse.status}`, debugResponse.ok ? 'success' : 'error');
                
                const debugResult = await debugResponse.json();
                log(`Debug Response: ${JSON.stringify(debugResult, null, 2)}`);
                
                const headers = {};
                for (let [key, value] of debugResponse.headers.entries()) {
                    headers[key] = value;
                }
                
                log(`Response Headers: ${JSON.stringify(headers, null, 2)}`);
                
                resultDiv.innerHTML = `
                    <p class="${debugResponse.ok ? 'success' : 'error'}">
                        Debug Upload Status: ${debugResponse.status} ${debugResponse.statusText}
                    </p>
                    <pre>${JSON.stringify(debugResult, null, 2)}</pre>
                    <h4>Response Headers:</h4>
                    <pre>${JSON.stringify(headers, null, 2)}</pre>
                `;
                
            } catch (error) {
                log(`File Upload Error: ${error.message}`, 'error');
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
        
        async function checkResponseHeaders() {
            const resultDiv = document.getElementById('headers-result');
            resultDiv.innerHTML = '<p class="info">Checking response headers...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/test-brevo`);
                
                const headers = {};
                for (let [key, value] of response.headers.entries()) {
                    headers[key] = value;
                }
                
                log(`API Response Headers: ${JSON.stringify(headers, null, 2)}`);
                
                resultDiv.innerHTML = `
                    <h4>API Response Headers:</h4>
                    <pre>${JSON.stringify(headers, null, 2)}</pre>
                `;
                
            } catch (error) {
                log(`Headers Check Error: ${error.message}`, 'error');
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
        
        // Auto-run basic tests on load
        window.addEventListener('load', () => {
            log('CORB Test Suite Loaded');
            log(`API Base URL: ${API_BASE}`);
            log(`Current Origin: ${window.location.origin}`);
        });
    </script>
</body>
</html>
